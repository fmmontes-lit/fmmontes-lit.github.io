<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitPlayground</title>
  <link rel="stylesheet" href="static/styles.css" />
  <link rel="stylesheet" href="static/lib/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="static/css/site.css" />
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css" />
</head>

<body>
  <nav class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target=".navbar-collapse"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="navbar-collapse collapse d-sm-inline-flex justify-content-between">
        <ul class="navbar-nav flex-grow-1">
          <li class="nav-item">
            <a class="nav-link text-dark" href="./index.html">Home</a>
          </li>
        </ul>
      </div>

      <div id="nav-corner" style="color: #1b6ec2">
        (^_^)
        <div id="current-time"></div>
      </div>
    </div>
  </nav>

  <!-- //////////////////////////////////////////////////////////// -->
  <!-- ////////////////// PAGE BODY /////////////////////////////// -->
  <!-- //////////////////////////////////////////////////////////// -->

  <div class="row">
    <!-- ////////////////// COLUMN MAIN /////////////////////////// -->
    <div class="col-sm-12 col-md-9">
      <style>
        .responsive-image-container {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background-color: white;
        }

        .responsive-image-container img {
          max-width: 100%;
          height: auto;
          border-radius: 0.5em;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
      </style>
      <div class="responsive-image-container">
        <img src="https://www.lit.edu/getmedia/165d7c6d-020c-4547-96cf-22f04402775c/824-1000x800.jpg"
          title="Responsive Image Example" alt="Responsive Image Example" />
      </div>
    </div>

    <!-- ////////////////// COLUMN ASIDE ////////////////////////// -->
    <div class="col-sm-12 col-md-3">
      <!-- /// SIDE NAV STYLES //////////////////////////////////////// -->
      <style>
        .sidebar-sub-drawer {
          display: flex;
          flex-direction: column;
          margin-top: 1.5em;
          padding: 0;
          box-shadow: 10px 10px 1px rgba(0, 0, 0, 0.1);
          border: 1px solid rgba(0, 0, 0, 0.3);
          border-radius: 8px;
        }

        .sidebar-sub-drawer a {
          text-decoration: none;
          color: #1c75bc;
          padding: 1rem 2rem;
          transition:
            transform 0.2s ease-in-out,
            box-shadow 0.2s ease-in-out;
        }

        .sidebar-sub-drawer a:hover {
          transform: translateX(-10px);
          box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.8);
          color: #1e448d;
          background-color: #eee;
          border-radius: 8px;
        }

        @media (min-width: 768px) {
          .sidebar-sub-drawer {
            margin: 0;
          }
        }
      </style>
      <div class="sidebar-sub-drawer">
        <a href="#">A</a>
        <a href="#">B</a>
        <a href="#">C</a>
      </div>
    </div>
  </div>

  <!-- //////////////////////////////////////////////////////////// -->
  <!-- ////////////////// SCRIPTS ///////////////////////////////// -->
  <!-- //////////////////////////////////////////////////////////// -->
  <script src="static/js/site.js" type="module"></script>
  <script src="static/lib/jquery/dist/jquery.min.js" type="module"></script>
  <script src="static/lib/bootstrap/dist/js/bootstrap.bundle.min.js" type="module"></script>
  <script src="static/lit_news_files/scripts/bootstrap.bundle.min.js" type="module"></script>
</body>

</html>
